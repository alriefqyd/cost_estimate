[program:cost-estimate-worker]
command=php /home/engineer/myproject/cost_estimate/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
directory=/home/engineer/myproject/cost_estimate
autostart=true
autorestart=true
startretries=3
